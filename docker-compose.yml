version: '3.8'

services:
  postgres:
    image: postgres:14
    container_name: nutribunda_postgres
    environment:
      POSTGRES_DB: nutribunda
      POSTGRES_USER: nutribunda_user
      POSTGRES_PASSWORD: nutribunda_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutribunda_user -d nutribunda"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
