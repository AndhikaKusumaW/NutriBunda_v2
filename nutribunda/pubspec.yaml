name: nutribunda
description: "NutriBunda - Aplikasi pemantau gizi MPASI dan diet pemulihan ibu pasca-melahirkan"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.2
  get_it: ^8.0.2

  # HTTP & API
  dio: ^5.7.0
  http: ^1.2.2
  http_parser: ^4.0.2

  # Local Storage
  sqflite: ^2.4.1
  path: ^1.9.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # Authentication
  local_auth: ^2.3.0

  # Sensors
  sensors_plus: ^6.0.1
  pedometer: ^4.0.2

  # Location & Maps
  geolocator: ^13.0.2
  google_maps_flutter: ^2.9.0
  url_launcher: ^6.3.1
  
  # Connectivity
  connectivity_plus: ^6.1.0

  # Notifications
  flutter_local_notifications: ^20.0.0
  timezone: ^0.10.0

  # Gemini AI
  google_generative_ai: ^0.4.6

  # Image Handling
  image_picker: ^1.1.2
  image: ^4.3.0

  # Utilities
  intl: ^0.20.1
  equatable: ^2.0.7
  dartz: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.13
  sqflite_common_ffi: ^2.3.3

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
